<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Previous Lyrics Overlay</title>
    <style>
        @font-face {
            font-family: 'Spotify Mix';
            src: url('font/SpotifyMix-Extrabold.woff2') format('woff2'),
                 url('font/SpotifyMix-Extrabold.woff') format('woff'),
                 url('font/SpotifyMix-Extrabold.ttf') format('truetype');
            font-weight: bold;
            font-style: normal;
            font-display: swap;
        }

        :root {
            --background-primary: #000000;
            --text-primary: #FFFFFF;
            --text-tertiary: rgba(255, 255, 255, 0.6);
            --spotify-green: #1ed760;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Spotify Mix', 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--background-primary);
            color: var(--text-primary);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
        }
        
        .lyrics-content {
            width: 100%;
            text-align: center;
            padding: 40px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .lyrics-line {
            padding: 20px 0;
            font-size: 48px;
            line-height: 1.4;
            color: var(--text-tertiary);
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            font-weight: 500;
            letter-spacing: -0.02em;
            display: none; /* Only target line */
            word-wrap: break-word;
            overflow-wrap: break-word;
            max-width: 100%;
        }

        .lyrics-line.target {
            display: block;
            color: var(--text-tertiary);
            font-weight: 500;
        }
        
        #status {
            font-size: 1.5em;
            opacity: 0.7;
            color: #fff;
        }
    </style>
</head>
<body>
    <div id="lyrics-content" class="lyrics-content">
        <div id="status">Waiting for music...</div>
    </div>

    <script src="spotify-player-manager.js"></script>
    <script>
        let currentTrackId = null;
        let lyricsData = [];
        let isSynced = false;
        let lyricsOffset = 0;
        let manualLyricsId = null;

        spotifyManager.onControlMessage = (d) => {
            if (d.type === 'control-sync') {
                if (d.lyricsOffset !== undefined) lyricsOffset = d.lyricsOffset;
                if (d.manualLyrics !== undefined) update();
            }
            if (d.type === 'lyrics-sync' && d.lyrics) {
                if (d.trackId === currentTrackId) {
                    lyricsData = d.lyrics;
                    isSynced = d.lyricsType === 'synced';
                    document.getElementById('lyrics-content').innerHTML = '';
                }
            }
            // Cross-device settings sync
            if (d.type === 'settings-sync') {
                update();
            }
        };

        // Connect SSE for real-time cross-device sync
        if (spotifyManager.sessionId) {
            spotifyManager.connectSSE();
        }

        async function fetchLyrics(artist, title) {
            try {
                const url = `${spotifyManager.API_BASE}/lyrics/${encodeURIComponent(artist)}/${encodeURIComponent(title)}`;
                const response = await fetch(url, {
                    credentials: 'include',
                    headers: { 'X-Session-Id': spotifyManager.sessionId || '' }
                });
                if (!response.ok) return null;
                const data = await response.json();
                if (data.success && data.lyrics && Array.isArray(data.lyrics)) {
                    data.lyrics = data.lyrics.map(line => ({ ...line }));
                }
                return data;
            } catch (e) { return null; }
        }

        async function fetchManualLyrics(source, id) {
            try {
                const url = `${spotifyManager.API_BASE}/get-lyrics/${source}/${encodeURIComponent(id)}`;
                const response = await fetch(url, {
                    credentials: 'include',
                    headers: { 'X-Session-Id': spotifyManager.sessionId || '' }
                });
                if (!response.ok) return null;
                const data = await response.json();
                if (data.success && data.lyrics && Array.isArray(data.lyrics)) {
                    data.lyrics = data.lyrics.map(line => ({ ...line }));
                }
                return data;
            } catch (e) { return null; }
        }

        function renderLyrics(currentTime) {
            const container = document.getElementById('lyrics-content');
            const status = document.getElementById('status');
            
            if (!lyricsData || lyricsData.length === 0) {
                if(status) {
                    status.innerText = "No lyrics found";
                    status.style.display = 'block';
                }
                return;
            }
            if(status) status.style.display = 'none';

            let activeIndex = -1;
            for (let i = 0; i < lyricsData.length; i++) {
                if (lyricsData[i].time <= currentTime) activeIndex = i;
                else break;
            }

            const targetIndex = activeIndex - 1;
            const existingLines = document.getElementsByClassName('lyrics-line');
            if (existingLines.length !== lyricsData.length) {
                container.innerHTML = '';
                lyricsData.forEach((line, index) => {
                    const div = document.createElement('div');
                    div.className = 'lyrics-line';
                    div.setAttribute('data-index', index);
                    div.innerText = line.text;
                    container.appendChild(div);
                });
            }

            for (let i = 0; i < lyricsData.length; i++) {
                const lineDiv = container.querySelector(`.lyrics-line[data-index="${i}"]`);
                if (!lineDiv) continue;
                if (i === targetIndex) lineDiv.classList.add('target');
                else lineDiv.classList.remove('target');
            }
        }

        async function update() {
            const trackData = await spotifyManager.fetchCurrentTrack();
            if (trackData && (trackData.isPlaying || trackData.name)) {
                lyricsOffset = trackData.lyricsOffset || 0;
                const serverManualLyrics = trackData.manualLyrics;

                let shouldFetchLyrics = false;
                let fetchMode = 'auto';

                if (trackData.id !== currentTrackId) {
                    currentTrackId = trackData.id;
                    shouldFetchLyrics = true;
                }

                if (serverManualLyrics) {
                    if (manualLyricsId !== serverManualLyrics.id) {
                        shouldFetchLyrics = true;
                        fetchMode = 'manual';
                        manualLyricsId = serverManualLyrics.id;
                    } else if (shouldFetchLyrics) fetchMode = 'manual';
                } else if (manualLyricsId !== null) {
                    shouldFetchLyrics = true;
                    fetchMode = 'auto';
                    manualLyricsId = null;
                }

                if (shouldFetchLyrics) {
                    lyricsData = [];
                    document.getElementById('lyrics-content').innerHTML = '<div id="status">Loading...</div>';
                    let lrc = fetchMode === 'manual' ? await fetchManualLyrics(serverManualLyrics.source, serverManualLyrics.id) : await fetchLyrics(trackData.artist, trackData.name);
                    if (lrc && lrc.success) {
                        lyricsData = lrc.lyrics;
                        isSynced = lrc.type === 'synced';
                        document.getElementById('lyrics-content').innerHTML = '';
                    } else {
                        document.getElementById('lyrics-content').innerHTML = '<div id="status">Unavailable</div>';
                    }
                }
            } else {
                document.getElementById('lyrics-content').innerHTML = '<div id="status">Paused</div>';
            }
        }
        
        function loop() {
            if (isSynced && currentTrackId) {
                renderLyrics(spotifyManager.getProjectedProgress() + lyricsOffset);
            }
            requestAnimationFrame(loop);
        }

        setInterval(update, 2000);
        update();
        loop();
    </script>
</body>
</html>
