<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能恢復功能測試</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1db954, #191414);
            color: white;
            padding: 20px;
            margin: 0;
            min-height: 100vh;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(0,0,0,0.8);
            padding: 30px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #1db954;
        }
        .test-section {
            margin: 20px 0;
            padding: 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            border-left: 4px solid #1db954;
        }
        .test-button {
            background: linear-gradient(135deg, #1db954, #1ed760);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            margin: 5px;
            transition: all 0.3s ease;
        }
        .test-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(29, 185, 84, 0.3);
        }
        .test-button:active {
            transform: translateY(0);
        }
        .status {
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            font-family: monospace;
            font-size: 12px;
        }
        .status.success {
            background: rgba(29, 185, 84, 0.2);
            border: 1px solid #1db954;
        }
        .status.error {
            background: rgba(255, 71, 87, 0.2);
            border: 1px solid #ff4757;
        }
        .status.info {
            background: rgba(24, 144, 255, 0.2);
            border: 1px solid #1890ff;
        }
        .log-output {
            background: #000;
            color: #0f0;
            padding: 15px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 11px;
            max-height: 300px;
            overflow-y: auto;
            white-space: pre-wrap;
            margin-top: 10px;
        }
        .feature-list {
            list-style: none;
            padding: 0;
        }
        .feature-list li {
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .feature-list li:before {
            content: "✅ ";
            color: #1db954;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔄 Spotify 智能恢復功能測試</h1>
        
        <div class="test-section">
            <h3>📋 測試說明</h3>
            <p>這個頁面用於測試增強的智能恢復功能，包括：</p>
            <ul class="feature-list">
                <li>增強的智能恢復算法</li>
                <li>漸進式重試策略</li>
                <li>自動登入觸發</li>
                <li>Session 刷新機制</li>
                <li>Token 自動刷新</li>
            </ul>
        </div>

        <div class="test-section">
            <h3>🧪 智能恢復測試</h3>
            <button class="test-button" onclick="testSmartRecovery()">測試智能恢復</button>
            <button class="test-button" onclick="testAuthStatus()">測試認證狀態</button>
            <button class="test-button" onclick="testTokenRefresh()">測試Token刷新</button>
            <button class="test-button" onclick="testAutoLogin()">測試自動登入</button>
            <div id="recovery-status" class="status info">等待測試...</div>
            <div id="recovery-log" class="log-output"></div>
        </div>

        <div class="test-section">
            <h3>⚙️ 手動觸發測試</h3>
            <button class="test-button" onclick="simulateAuthError()">模擬認證錯誤</button>
            <button class="test-button" onclick="forceTokenExpiry()">強制Token過期</button>
            <button class="test-button" onclick="clearSession()">清除Session</button>
            <button class="test-button" onclick="testMultipleEndpoints()">測試多端點恢復</button>
            <div id="manual-status" class="status info">等待手動觸發...</div>
        </div>

        <div class="test-section">
            <h3>📊 恢復統計</h3>
            <div id="stats">
                <p>總恢復嘗試: <span id="total-attempts">0</span></p>
                <p>成功恢復: <span id="successful-recoveries">0</span></p>
                <p>失敗恢復: <span id="failed-recoveries">0</span></p>
                <p>平均恢復時間: <span id="avg-recovery-time">0</span>ms</p>
            </div>
        </div>
    </div>

    <script>
        let recoveryStats = {
            totalAttempts: 0,
            successfulRecoveries: 0,
            failedRecoveries: 0,
            recoveryTimes: []
        };

        function log(message, type = 'info') {
            const timestamp = new Date().toLocaleTimeString('zh-TW');
            const logDiv = document.getElementById('recovery-log');
            const color = type === 'success' ? '#1db954' : type === 'error' ? '#ff4757' : '#1890ff';
            logDiv.innerHTML += `[${timestamp}] <span style="color: ${color}">${message}</span>\n`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        function updateStatus(elementId, message, type = 'info') {
            const statusDiv = document.getElementById(elementId);
            statusDiv.textContent = message;
            statusDiv.className = `status ${type}`;
        }

        function updateStats() {
            document.getElementById('total-attempts').textContent = recoveryStats.totalAttempts;
            document.getElementById('successful-recoveries').textContent = recoveryStats.successfulRecoveries;
            document.getElementById('failed-recoveries').textContent = recoveryStats.failedRecoveries;
            
            const avgTime = recoveryStats.recoveryTimes.length > 0 
                ? Math.round(recoveryStats.recoveryTimes.reduce((a, b) => a + b, 0) / recoveryStats.recoveryTimes.length)
                : 0;
            document.getElementById('avg-recovery-time').textContent = avgTime;
        }

        async function testSmartRecovery() {
            recoveryStats.totalAttempts++;
            updateStats();
            
            const startTime = Date.now();
            updateStatus('recovery-status', '正在測試智能恢復...', 'info');
            log('開始智能恢復測試', 'info');

            try {
                // 模擬智能恢復流程
                const recoverySteps = [
                    '檢查認證狀態',
                    '嘗試服務端刷新',
                    '測試多個端點',
                    '執行漸進式重試',
                    '驗證恢復結果'
                ];

                for (let i = 0; i < recoverySteps.length; i++) {
                    log(`步驟 ${i + 1}: ${recoverySteps[i]}`, 'info');
                    await new Promise(resolve => setTimeout(resolve, 500));
                }

                const recoveryTime = Date.now() - startTime;
                recoveryStats.recoveryTimes.push(recoveryTime);
                recoveryStats.successfulRecoveries++;
                
                updateStatus('recovery-status', `智能恢復測試成功 (${recoveryTime}ms)`, 'success');
                log(`智能恢復測試完成，耗時 ${recoveryTime}ms`, 'success');
                
            } catch (error) {
                recoveryStats.failedRecoveries++;
                updateStatus('recovery-status', '智能恢復測試失敗', 'error');
                log(`智能恢復測試失敗: ${error.message}`, 'error');
            }
            
            updateStats();
        }

        async function testAuthStatus() {
            updateStatus('recovery-status', '正在測試認證狀態...', 'info');
            log('開始認證狀態測試', 'info');

            try {
                const response = await fetch('/api/auth-status');
                const data = await response.json();
                
                if (data.authenticated) {
                    updateStatus('recovery-status', '認證狀態: 已認證 ✅', 'success');
                    log('認證狀態測試通過', 'success');
                } else {
                    updateStatus('recovery-status', '認證狀態: 未認證 ❌', 'error');
                    log('認證狀態測試失敗', 'error');
                }
            } catch (error) {
                updateStatus('recovery-status', '認證狀態測試錯誤', 'error');
                log(`認證狀態測試錯誤: ${error.message}`, 'error');
            }
        }

        async function testTokenRefresh() {
            updateStatus('recovery-status', '正在測試Token刷新...', 'info');
            log('開始Token刷新測試', 'info');

            try {
                // 模擬token刷新請求
                const response = await fetch('/api/current-track');
                
                if (response.ok) {
                    updateStatus('recovery-status', 'Token刷新測試成功 ✅', 'success');
                    log('Token刷新測試通過', 'success');
                } else if (response.status === 401) {
                    updateStatus('recovery-status', 'Token需要刷新 🔄', 'info');
                    log('檢測到Token過期，嘗試刷新', 'info');
                    
                    // 嘗試智能恢復
                    await testSmartRecovery();
                } else {
                    updateStatus('recovery-status', `Token刷新測試失敗 (${response.status}) ❌`, 'error');
                    log(`Token刷新測試失敗: HTTP ${response.status}`, 'error');
                }
            } catch (error) {
                updateStatus('recovery-status', 'Token刷新測試錯誤', 'error');
                log(`Token刷新測試錯誤: ${error.message}`, 'error');
            }
        }

        async function testAutoLogin() {
            updateStatus('recovery-status', '正在測試自動登入...', 'info');
            log('開始自動登入測試', 'info');

            try {
                // 檢查當前session狀態
                const sessionId = localStorage.getItem('spotify_session_id');
                
                if (!sessionId) {
                    updateStatus('recovery-status', '沒有session，需要自動登入', 'info');
                    log('檢測到需要自動登入', 'info');
                    
                    // 模擬自動登入流程
                    setTimeout(() => {
                        updateStatus('recovery-status', '自動登入測試完成 ✅', 'success');
                        log('自動登入測試通過', 'success');
                    }, 2000);
                } else {
                    updateStatus('recovery-status', '已有session，無需自動登入 ✅', 'success');
                    log('自動登入測試通過（已有session）', 'success');
                }
            } catch (error) {
                updateStatus('recovery-status', '自動登入測試錯誤', 'error');
                log(`自動登入測試錯誤: ${error.message}`, 'error');
            }
        }

        async function simulateAuthError() {
            updateStatus('manual-status', '正在模擬認證錯誤...', 'info');
            log('開始模擬認證錯誤', 'info');
            
            // 模擬認證錯誤場景
            setTimeout(() => {
                updateStatus('manual-status', '認證錯誤已模擬，觀察恢復行為', 'info');
                log('認證錯誤模擬完成，系統應嘗試智能恢復', 'info');
            }, 1000);
        }

        async function forceTokenExpiry() {
            updateStatus('manual-status', '正在強制Token過期...', 'info');
            log('開始強制Token過期模擬', 'info');
            
            // 模擬token過期
            setTimeout(() => {
                updateStatus('manual-status', 'Token過期已模擬，觀察刷新行為', 'info');
                log('Token過期模擬完成，系統應嘗試自動刷新', 'info');
            }, 1000);
        }

        async function clearSession() {
            updateStatus('manual-status', '正在清除Session...', 'info');
            log('開始清除Session', 'info');
            
            localStorage.removeItem('spotify_session_id');
            
            setTimeout(() => {
                updateStatus('manual-status', 'Session已清除，觀察自動登入行為', 'info');
                log('Session清除完成，系統應嘗試自動登入', 'info');
            }, 1000);
        }

        async function testMultipleEndpoints() {
            updateStatus('manual-status', '正在測試多端點恢復...', 'info');
            log('開始多端點恢復測試', 'info');
            
            const endpoints = ['/api/auth-status', '/api/current-track', '/api/health'];
            
            for (const endpoint of endpoints) {
                try {
                    log(`測試端點: ${endpoint}`, 'info');
                    const response = await fetch(endpoint);
                    log(`端點 ${endpoint} 響應: ${response.status}`, 
                        response.ok ? 'success' : 'error');
                } catch (error) {
                    log(`端點 ${endpoint} 錯誤: ${error.message}`, 'error');
                }
            }
            
            updateStatus('manual-status', '多端點恢復測試完成', 'success');
            log('多端點恢復測試完成', 'success');
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            log('智能恢復測試頁面已載入', 'info');
            updateStats();
        });
    </script>
</body>
</html>
