<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Song Info</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: transparent;
            color: #000;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
            text-align: center;
        }
        
        #container {
            width: 90%;
            display: flex;
            flex-direction: column;
            gap: 10px;
            /* Remove text-shadow as requested */
            text-shadow: none !important;
        }
        
        #track-name {
            font-size: 48px; /* Larger font */
            font-weight: 800;
            color: #000;
            margin: 0;
            line-height: 1.2;
        }
        
        #artist-name {
            font-size: 32px; /* Larger font */
            font-weight: 600;
            color: #000;
            margin: 0;
        }
        
        #album-name {
            font-size: 20px;
            font-weight: 400;
            color: #000;
            margin: 0;
            opacity: 0.8;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="track-name">Waiting...</div>
        <div id="artist-name"></div>
        <div id="album-name"></div>
    </div>

    <script>
        const API_BASE = window.location.origin + '/api';

        // Session Management
        let sessionId = new URLSearchParams(window.location.search).get('sessionId');

        // Fetch session ID from server if not provided in URL
        async function fetchSessionId() {
            if (sessionId) return sessionId;
            try {
                const response = await fetch(`${API_BASE}/auth-status`, {
                    credentials: 'include'
                });
                if (response.ok) {
                    const data = await response.json();
                    if (data.sessionId) {
                        sessionId = data.sessionId;
                        console.log('🔑 Retrieved session ID from server:', sessionId.substring(0, 8) + '...');
                    }
                }
            } catch (e) {
                console.warn('⚠️ Could not fetch session ID from server:', e.message);
            }
            return sessionId;
        }

        // Listen for session updates from main window
        const authChannel = typeof BroadcastChannel !== 'undefined' ? new BroadcastChannel('spotify_auth') : null;
        if (authChannel) {
            authChannel.onmessage = (ev) => {
                const d = ev.data || {};
                if (d.type === 'session-update' && d.sessionId) {
                    console.log('Received session ID from broadcast:', d.sessionId);
                    sessionId = d.sessionId;
                }
            };
        }

        async function fetchCurrentTrack() {
            try {
                let url = `${API_BASE}/current-track`;
                const params = new URLSearchParams();
                if (sessionId) params.set('sessionId', sessionId);
                if (params.toString()) url += '?' + params.toString();

                const response = await fetch(url, {
                    credentials: 'include',
                    headers: {
                        'X-Session-Id': sessionId || ''
                    }
                });
                if (!response.ok) return null;
                return await response.json();
            } catch (e) {
                return null;
            }
        }

        async function update() {
            // Ensure we have a session ID before fetching
            if (!sessionId) {
                await fetchSessionId();
            }

            try {
                const trackData = await fetchCurrentTrack();
                if (!trackData) return;

                const data = trackData;
                
                if (data.isPlaying || data.name) {
                    document.getElementById('track-name').textContent = data.name;
                    document.getElementById('artist-name').textContent = data.artist;
                    document.getElementById('album-name').textContent = data.album;
                } else {
                    document.getElementById('track-name').textContent = "Not Playing";
                    document.getElementById('artist-name').textContent = "";
                    document.getElementById('album-name').textContent = "";
                }
            } catch (e) {
                console.error(e);
            }
        }

        setInterval(update, 3000);
        update();
    </script>
</body>
</html>
