<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Song Info</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: transparent;
            color: #000;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
            text-align: center;
        }
        
        #container {
            width: 90%;
            display: flex;
            flex-direction: column;
            gap: 10px;
            /* Remove text-shadow as requested */
            text-shadow: none !important;
            overflow: hidden;
        }
        
        #track-name {
            font-size: 48px; /* Larger font */
            font-weight: 800;
            color: #000;
            margin: 0;
            line-height: 1.2;
            overflow: hidden;
            word-wrap: break-word;
            overflow-wrap: break-word;
            max-width: 100%;
        }
        
        #artist-name {
            font-size: 32px; /* Larger font */
            font-weight: 600;
            color: #000;
            margin: 0;
        }
        
        #album-name {
            font-size: 20px;
            font-weight: 400;
            color: #000;
            margin: 0;
            opacity: 0.8;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="track-name">Waiting...</div>
        <div id="artist-name"></div>
        <div id="album-name"></div>
    </div>

    <script src="spotify-player-manager.js"></script>
    <script>
        async function update() {
            try {
                const trackData = await spotifyManager.fetchCurrentTrack();
                if (!trackData) return;
                
                if (trackData.isPlaying || trackData.name) {
                    document.getElementById('track-name').textContent = trackData.name;
                    document.getElementById('artist-name').textContent = trackData.artist;
                    document.getElementById('album-name').textContent = trackData.album;
                } else {
                    document.getElementById('track-name').textContent = "Not Playing";
                    document.getElementById('artist-name').textContent = "";
                    document.getElementById('album-name').textContent = "";
                }
            } catch (e) {
                console.error(e);
            }
        }

        setInterval(update, 3000);
        update();
    </script>
</body>
</html>
