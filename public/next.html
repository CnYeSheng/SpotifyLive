<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Next Lyrics Overlay</title>
    <style>
        @font-face {
            font-family: 'Spotify Mix';
            src: url('font/SpotifyMix-Extrabold.woff2') format('woff2'),
                 url('font/SpotifyMix-Extrabold.woff') format('woff'),
                 url('font/SpotifyMix-Extrabold.ttf') format('truetype');
            font-weight: bold;
            font-style: normal;
            font-display: swap;
        }

        :root {
            --text: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.55);
            --accent: #1ed760;
        }

        * { box-sizing: border-box; }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { animation-duration: 0.001ms !important; transition-duration: 0.001ms !important; }
        }

        html, body {
            margin: 0;
            padding: 0;
            background: transparent;
        }

        body {
            font-family: 'Spotify Mix', 'Inter', -apple-system, BlinkMacSystemFont, "PingFang TC", "Noto Sans TC", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: var(--text);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
        }

        .eyebrow {
            position: absolute;
            top: 18px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: var(--accent);
            opacity: 0.85;
        }

        .lyrics-content {
            width: 100%;
            text-align: center;
            padding: 40px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .lyrics-line {
            padding: 16px 0;
            font-size: clamp(28px, 5.5vw, 48px);
            line-height: 1.4;
            color: rgba(255, 255, 255, 0.55);
            transition: opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1), transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            font-weight: 600;
            letter-spacing: -0.02em;
            display: none;
            opacity: 0;
            transform: translateY(8px);
            word-wrap: break-word;
            overflow-wrap: break-word;
            max-width: 100%;
            text-shadow: 0 2px 18px rgba(0,0,0,0.5);
        }

        .lyrics-line.target {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        #status {
            font-size: 1.4em;
            opacity: 0.65;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .spinner {
            width: 20px; height: 20px;
            border: 2.5px solid rgba(255,255,255,0.2);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            flex-shrink: 0;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="eyebrow">Next</div>
    <div id="lyrics-content" class="lyrics-content">
        <div id="status"><span class="spinner"></span>等待播放中...</div>
    </div>

    <script src="spotify-player-manager.js"></script>
    <script>
        let currentTrackId = null;
        let lyricsData = [];
        let isSynced = false;
        let lyricsOffset = 0;
        let manualLyricsId = null;

        spotifyManager.onControlMessage = (d) => {
            if (d.type === 'control-sync') {
                if (d.lyricsOffset !== undefined) lyricsOffset = d.lyricsOffset;
                if (d.manualLyrics !== undefined) update();
            }
            if (d.type === 'lyrics-sync' && d.lyrics) {
                if (d.trackId === currentTrackId) {
                    lyricsData = d.lyrics;
                    isSynced = d.lyricsType === 'synced';
                    document.getElementById('lyrics-content').innerHTML = '';
                }
            }
            if (d.type === 'settings-sync') update();
        };

        // Keep the session URL in sync across devices/tabs (was missing before)
        spotifyManager.onSessionUpdate = (newId) => {
            const newUrl = new URL(window.location);
            newUrl.searchParams.set('sessionId', newId);
            window.history.pushState({}, '', newUrl);
            update();
        };

        if (spotifyManager.sessionId && typeof spotifyManager.connectSSE === 'function') {
            spotifyManager.connectSSE();
        }

        async function fetchLyrics(artist, title) {
            try {
                const url = `${spotifyManager.API_BASE}/lyrics/${encodeURIComponent(artist)}/${encodeURIComponent(title)}`;
                const response = await fetch(url, {
                    credentials: 'include',
                    headers: { 'X-Session-Id': spotifyManager.sessionId || '' }
                });
                if (!response.ok) return null;
                const data = await response.json();
                if (data.success && data.lyrics && Array.isArray(data.lyrics)) {
                    data.lyrics = data.lyrics.map(line => ({ ...line }));
                }
                return data;
            } catch (e) { return null; }
        }

        async function fetchManualLyrics(source, id) {
            try {
                const url = `${spotifyManager.API_BASE}/get-lyrics/${source}/${encodeURIComponent(id)}`;
                const response = await fetch(url, {
                    credentials: 'include',
                    headers: { 'X-Session-Id': spotifyManager.sessionId || '' }
                });
                if (!response.ok) return null;
                const data = await response.json();
                if (data.success && data.lyrics && Array.isArray(data.lyrics)) {
                    data.lyrics = data.lyrics.map(line => ({ ...line }));
                }
                return data;
            } catch (e) { return null; }
        }

        function setStatus(text) {
            document.getElementById('lyrics-content').innerHTML =
                `<div id="status">${text}</div>`;
        }

        function renderLyrics(currentTime) {
            const container = document.getElementById('lyrics-content');
            const status = document.getElementById('status');

            if (!lyricsData || lyricsData.length === 0) {
                if (status) {
                    status.innerText = '找不到歌詞';
                    status.style.display = 'flex';
                }
                return;
            }
            if (status) status.style.display = 'none';

            let activeIndex = -1;
            for (let i = 0; i < lyricsData.length; i++) {
                if (lyricsData[i].time <= currentTime) activeIndex = i;
                else break;
            }

            const targetIndex = activeIndex + 1;
            const existingLines = document.getElementsByClassName('lyrics-line');
            if (existingLines.length !== lyricsData.length) {
                container.innerHTML = '';
                lyricsData.forEach((line, index) => {
                    const div = document.createElement('div');
                    div.className = 'lyrics-line';
                    div.setAttribute('data-index', index);
                    div.innerText = line.text;
                    container.appendChild(div);
                });
            }

            for (let i = 0; i < lyricsData.length; i++) {
                const lineDiv = container.querySelector(`.lyrics-line[data-index="${i}"]`);
                if (!lineDiv) continue;
                if (i === targetIndex) lineDiv.classList.add('target');
                else lineDiv.classList.remove('target');
            }
        }

        async function update() {
            let trackData;
            try {
                trackData = await spotifyManager.fetchCurrentTrack();
            } catch (e) {
                trackData = null;
            }

            if (trackData && (trackData.isPlaying || trackData.name)) {
                lyricsOffset = trackData.lyricsOffset || 0;
                const serverManualLyrics = trackData.manualLyrics;

                let shouldFetchLyrics = false;
                let fetchMode = 'auto';

                if (trackData.id !== currentTrackId) {
                    currentTrackId = trackData.id;
                    shouldFetchLyrics = true;
                }

                if (serverManualLyrics) {
                    if (manualLyricsId !== serverManualLyrics.id) {
                        shouldFetchLyrics = true;
                        fetchMode = 'manual';
                        manualLyricsId = serverManualLyrics.id;
                    } else if (shouldFetchLyrics) fetchMode = 'manual';
                } else if (manualLyricsId !== null) {
                    shouldFetchLyrics = true;
                    fetchMode = 'auto';
                    manualLyricsId = null;
                }

                if (shouldFetchLyrics) {
                    lyricsData = [];
                    setStatus('<span class="spinner"></span>載入中...');
                    let lrc = fetchMode === 'manual'
                        ? await fetchManualLyrics(serverManualLyrics.source, serverManualLyrics.id)
                        : await fetchLyrics(trackData.artist, trackData.name);
                    if (lrc && lrc.success) {
                        lyricsData = lrc.lyrics;
                        isSynced = lrc.type === 'synced';
                        document.getElementById('lyrics-content').innerHTML = '';
                    } else {
                        lyricsData = [];
                        setStatus('尚無歌詞');
                    }
                }
            } else {
                lyricsData = [];
                currentTrackId = null;
                setStatus('已暫停播放');
            }
        }

        function loop() {
            if (isSynced && currentTrackId) {
                renderLyrics(spotifyManager.getProjectedProgress() + lyricsOffset);
            }
            requestAnimationFrame(loop);
        }

        setInterval(update, 2000);
        update();
        loop();
    </script>
</body>
</html>
