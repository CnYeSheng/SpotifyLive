<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify 即時歌詞播放器</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="preload" href="font/SpotifyMix-Extrabold.woff2" as="font" type="font/woff2" crossorigin>
</head>
<body>
    <div class="container">
        <!-- 認證區域 -->
        <div id="auth-section" class="auth-section">
            <div class="auth-card">
                <h1>🎵 Spotify 即時歌詞播放器</h1>
                <p>連接你的 Spotify 帳戶來查看正在播放的音樂和即時歌詞</p>
                <button id="login-btn" class="login-btn">連接 Spotify</button>
            </div>
        </div>

        <!-- 主播放器區域 -->
        <div id="player-section" class="player-section" style="display: none;">
            <!-- 音樂信息卡片 -->
            <div class="music-card">
                <div class="album-art">
                    <img id="album-image" src="" alt="專輯封面">
                </div>
                
                <div class="track-info">
                    <h2 id="track-name">-</h2>
                    <p id="artist-name">-</p>
                    <p id="album-name">-</p>
                    <div id="device-info" class="device-info" style="display: none;">
                        <span id="device-name">-</span>
                    </div>
                </div>
                
                <!-- 播放控制 -->
                <div class="player-controls">
                    <button id="prev-btn" class="control-btn" title="上一首">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/>
                        </svg>
                    </button>
                    <button id="play-pause-btn" class="control-btn play-pause" title="播放/暫停">
                        <svg id="play-icon" width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M8 5v14l11-7z"/>
                        </svg>
                        <svg id="pause-icon" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" style="display: none;">
                            <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
                        </svg>
                    </button>
                    <button id="next-btn" class="control-btn" title="下一首">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/>
                        </svg>
                    </button>
                </div>
                
                <!-- 音量控制 -->
                <div class="volume-control">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
                    </svg>
                    <input type="range" id="volume-slider" min="0" max="100" value="50" class="volume-slider">
                    <span id="volume-value">50%</span>
                </div>
                
                <div class="progress-container">
                    <div class="progress-bar">
                        <div id="progress-fill" class="progress-fill"></div>
                    </div>
                    <div class="time-info">
                        <span id="current-time">0:00</span>
                        <span id="total-time">0:00</span>
                    </div>
                </div>
                
                <!-- 下一首預覽 -->
                <div id="next-track-preview" class="next-track-preview" style="display: none;">
                    <div class="next-track-info">
                        <span class="next-label">下一首：</span>
                        <span id="next-track-name">-</span>
                    </div>
                </div>
            </div>

            <!-- 歌詞區域 -->
            <div class="lyrics-container">
                <!--
                <div class="lyrics-header">
                    <h3>🎤 歌詞</h3>
                    <div class="lyrics-controls">
                        <button id="auto-scroll-btn" class="control-btn active">自動滾動</button>
                        <button id="font-size-btn" class="control-btn">字體大小</button>
                    </div>
                </div>
                -->
                
                <div id="lyrics-content" class="lyrics-content">
                    <div class="lyrics-placeholder">
                        <p>等待播放音樂...</p>
                    </div>
                </div>
            </div>

            <!-- 狀態指示器 -->
            <!-- 
            <div class="status-bar">
                <div class="status-item">
                    <span class="status-dot" id="spotify-status"></span>
                    <span>Spotify 連接</span>
                </div>
                <div class="status-item">
                    <span class="status-dot" id="lyrics-status"></span>
                    <span>歌詞服務</span>
                </div>
            </div>
        </div>
        -->

        <!-- 無音樂播放狀態 -->
        <div id="no-music-section" class="no-music-section" style="display: none;">
            <div class="no-music-card">
                <div class="no-music-icon">🎵</div>
                <h2>沒有正在播放的音樂</h2>
                <p>請在 Spotify 中開始播放音樂</p>
                <button id="refresh-btn" class="refresh-btn">重新檢查</button>
            </div>
        </div>
    </div>

    <!-- 字體大小選擇器 -->
    <div id="font-size-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <h3>選擇字體大小</h3>
            <div class="font-size-options">
                <button class="font-option" data-size="small">小</button>
                <button class="font-option" data-size="medium">中</button>
                <button class="font-option" data-size="large">大</button>
                <button class="font-option" data-size="extra-large">特大</button>
            </div>
            <button id="close-modal" class="close-btn">關閉</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/opencc-js@1.0.5/dist/umd/full.js"></script>
    <script src="opencc.js"></script>
    <script src="script.js"></script>
    <script src="apple-music-enhancements.js"></script>
</body>
</html>
