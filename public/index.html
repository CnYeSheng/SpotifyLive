<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify 即時歌詞播放器</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="preload" href="font/SpotifyMix-Extrabold.woff2" as="font" type="font/woff2" crossorigin>
</head>
<body>
    <!-- 动态背景系统已移除，恢复原始专辑封面背景 -->

    <div class="container">
        <!-- 認證區域 -->
        <div id="auth-section" class="auth-section">
            <div class="auth-card">
                <h1>🎵 Spotify 即時歌詞播放器</h1>
                <p>連接你的 Spotify 帳戶來查看正在播放的音樂和即時歌詞</p>
                <button id="login-btn" class="login-btn">連接 Spotify</button>
            </div>
        </div>

        <!-- 主播放器區域 -->
        <div id="player-section" class="player-section" style="display: none;">
            <!-- 下一首歌曲預覽 -->
            <div id="next-song-preview" class="next-song-preview" style="display: none;">
                <div class="next-song-content">
                    <div class="next-song-header">
                        <div class="next-song-label">下一首</div>
                        <!-- <button id="next-song-settings-btn" class="next-song-settings-btn" title="設置預覽模式">⚙️</button> -->
                    </div>
                    <div class="next-song-info">
                        <img id="next-song-cover" class="next-song-cover" src="" alt="下一首封面">
                        <div class="next-song-details">
                            <div id="next-song-title" class="next-song-title">-</div>
                            <div id="next-song-artist" class="next-song-artist">-</div>
                        </div>
                    </div>
                </div>
            </div>


            
            <!-- 音樂信息卡片 -->
            <div class="music-card">
                <div class="album-art">
                    <img id="album-image" src="" alt="專輯封面">
                </div>
                
                <div class="track-info">
                    <h2 id="track-name">-</h2>
                    <p id="artist-name">-</p>
                    <p id="album-name">-</p>
                    <div id="device-info" class="device-info" style="display: none;">
                        <span id="device-name">-</span>
                    </div>
                </div>
                
                <!-- 播放控制 -->
                <div class="player-controls">
                    <button id="shuffle-btn" class="control-btn" title="隨機播放">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/>
                        </svg>
                    </button>
                    <button id="prev-btn" class="control-btn" title="上一首">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/>
                        </svg>
                    </button>
                    <button id="play-pause-btn" class="control-btn play-pause" title="播放/暫停">
                        <svg id="play-icon" width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M8 5v14l11-7z"/>
                        </svg>
                        <svg id="pause-icon" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" style="display: none;">
                            <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
                        </svg>
                    </button>
                    <button id="next-btn" class="control-btn" title="下一首">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/>
                        </svg>
                    </button>
                    <button id="repeat-btn" class="control-btn" title="重複播放">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/>
                        </svg>
                    </button>
                </div>
                
                <!-- 額外功能按鈕 -->
                <div class="extra-controls">
                    <button id="add-to-playlist-btn" class="control-btn" title="加入播放清單">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
                        </svg>
                    </button>
                    <button id="playlist-btn" class="control-btn" title="播放清單">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M15 6H3v2h12V6zm0 4H3v2h12v-2zM3 16h8v-2H3v2zM17 6v8.18c-.31-.11-.65-.18-1-.18-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3V8h3V6h-5z"/>
                        </svg>
                    </button>
                    <button id="devices-btn" class="control-btn" title="投放設備">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M21 3H3c-1.1 0-2 .9-2 2v3h2V5h18v14h-7v2h7c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM1 18v3h3c0-1.66-1.34-3-3-3zm0-4v2c2.76 0 5 2.24 5 5h2c0-3.87-3.13-7-7-7zm0-4v2c4.97 0 9 4.03 9 9h2c0-6.08-4.93-11-11-11z"/>
                        </svg>
                    </button>
                </div>
                
                <!-- 音量控制 -->
                <div class="volume-control">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
                    </svg>
                    <input type="range" id="volume-slider" min="0" max="100" value="50" class="volume-slider">
                    <span id="volume-value">50%</span>
                </div>
                
                <div class="progress-container">
                    <div class="progress-bar">
                        <div id="progress-fill" class="progress-fill"></div>
                    </div>
                    <div class="time-info">
                        <span id="current-time">0:00</span>
                        <span id="total-time">0:00</span>
                    </div>
                </div>
                
                <!-- 下一首預覽 -->
                <div id="next-track-preview" class="next-track-preview" style="display: none;">
                    <div class="next-track-info">
                        <span class="next-label">下一首：</span>
                        <span id="next-track-name">-</span>
                    </div>
                </div>
            </div>

            <!-- 手機頁面指示器 -->
            <div class="mobile-page-indicator" id="mobile-page-indicator" style="display: none;">
                <div class="page-dots">
                    <div class="page-dot active" data-page="info"></div>
                    <div class="page-dot" data-page="lyrics"></div>
                </div>
                <div class="swipe-hint">
                    <span>← 滑動切換 →</span>
                </div>
            </div>

            <!-- 手機頁面切換按鈕 -->
            <div class="mobile-nav" id="mobile-nav" style="display: none;">
                <button id="mobile-info-btn" class="mobile-nav-btn active">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
                    </svg>
                    <!-- 音樂資訊 -->
                </button>
                <button id="mobile-lyrics-btn" class="mobile-nav-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
                    </svg>
                    <!-- 歌詞 -->
                </button>
            </div>

            <!-- 歌詞區域 -->
            <div class="lyrics-container">
                <div class="lyrics-header">
                    <h3>🎤 歌詞</h3>
                    <div class="lyrics-controls">
                        <!-- 下一首歌曲預覽設定 -->
                        <div class="preview-settings-section">
                            <button id="toggle-preview-settings" class="lyrics-control-btn" title="預覽設定">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                                    <path d="M12,15.5A3.5,3.5 0 0,1 8.5,12A3.5,3.5 0 0,1 12,8.5A3.5,3.5 0 0,1 15.5,12A3.5,3.5 0 0,1 12,15.5M19.43,12.98C19.47,12.66 19.5,12.33 19.5,12C19.5,11.67 19.47,11.34 19.43,11.02L21.54,9.37C21.73,9.22 21.78,8.95 21.66,8.73L19.66,5.27C19.54,5.05 19.27,4.97 19.05,5.05L16.56,6.05C16.04,5.65 15.48,5.32 14.87,5.07L14.5,2.42C14.46,2.18 14.25,2 14,2H10C9.75,2 9.54,2.18 9.5,2.42L9.13,5.07C8.52,5.32 7.96,5.66 7.44,6.05L4.95,5.05C4.73,4.96 4.46,5.05 4.34,5.27L2.34,8.73C2.21,8.95 2.27,9.22 2.46,9.37L4.57,11.02C4.53,11.34 4.5,11.67 4.5,12C4.5,12.33 4.53,12.66 4.57,12.98L2.46,14.63C2.27,14.78 2.21,15.05 2.34,15.27L4.34,18.73C4.46,18.95 4.73,19.03 4.95,18.95L7.44,17.95C7.96,18.35 8.52,18.68 9.13,18.93L9.5,21.58C9.54,21.82 9.75,22 10,22H14C14.25,22 14.46,21.82 14.5,21.58L14.87,18.93C15.48,18.68 16.04,18.34 16.56,17.95L19.05,18.95C19.27,19.04 19.54,18.95 19.66,18.73L21.66,15.27C21.78,15.05 21.73,14.78 21.54,14.63L19.43,12.98Z"/>
                                </svg>
                                預覽
                            </button>
                            <div id="preview-settings-dropdown" class="preview-settings-dropdown" style="display: none;">
                                <div class="settings-header">
                                    <span>下一首預覽</span>
                                </div>
                                <div class="radio-group-compact">
                                    <label class="radio-option-compact">
                                        <input type="radio" name="preview-mode" value="10" checked>
                                        <span>10秒</span>
                                    </label>
                                    <label class="radio-option-compact">
                                        <input type="radio" name="preview-mode" value="20">
                                        <span>20秒</span>
                                    </label>
                                    <label class="radio-option-compact">
                                        <input type="radio" name="preview-mode" value="30">
                                        <span>30秒</span>
                                    </label>
                                    <label class="radio-option-compact">
                                        <input type="radio" name="preview-mode" value="always">
                                        <span>始終</span>
                                    </label>
                                    <label class="radio-option-compact">
                                        <input type="radio" name="preview-mode" value="never">
                                        <span>從不</span>
                                    </label>
                                </div>
                            </div>
                        </div>
                        
                        <button id="lyrics-fast-btn" class="lyrics-control-btn" title="歌詞慢0.5秒">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M4 18l8.5-6L4 6v12zm9-12v12l8.5-6L13 6z"/>
                            </svg>
                            +0.5s
                        </button>
                        <button id="lyrics-reset-btn" class="lyrics-control-btn" title="重置歌詞時間">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6 0 1.01-.25 1.97-.7 2.8l1.46 1.46C19.54 15.03 20 13.57 20 12c0-4.42-3.58-8-8-8zm0 14c-3.31 0-6-2.69-6-6 0-1.01.25-1.97.7-2.8L5.24 7.74C4.46 8.97 4 10.43 4 12c0 4.42 3.58 8 8 8v3l4-4-4-4v3z"/>
                            </svg>
                        </button>
                        <button id="lyrics-slow-btn" class="lyrics-control-btn" title="歌詞快0.5秒">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M11 18V6l-8.5 6 8.5 6zm.5-6l8.5 6V6l-8.5 6z"/>
                            </svg>
                            -0.5s
                        </button>
                        <button id="search-lyrics-btn" class="lyrics-control-btn" title="搜尋歌詞">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
                            </svg>
                            搜尋
                        </button>
                        <button id="download-lyrics-btn" class="lyrics-control-btn" title="下載歌詞">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/>
                            </svg>
                            下載
                        </button>
                        <button id="upload-lyrics-btn" class="lyrics-control-btn" title="上傳歌詞">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M9 16h6v-6h4l-7-7-7 7h4zm-4 2h14v2H5z"/>
                            </svg>
                            上傳
                        </button>
                        <button id="edit-lyrics-btn" class="lyrics-control-btn" title="編輯歌詞">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/>
                            </svg>
                            編輯
                        </button>
                        <button id="user-lyrics-manager-btn" class="lyrics-control-btn" title="自定義歌詞管理">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
                            </svg>
                            管理
                        </button>
                        <!-- <button id="auto-scroll-btn" class="control-btn active">自動滾動</button>
                        <button id="font-size-btn" class="control-btn">字體大小</button> -->
                    </div>
                </div>
                
                <div id="lyrics-content" class="lyrics-content">
                    <div class="lyrics-placeholder">
                        <p>等待播放音樂...</p>
                    </div>
                </div>
            </div>

            <!-- 狀態指示器 -->
            <!-- 
            <div class="status-bar">
                <div class="status-item">
                    <span class="status-dot" id="spotify-status"></span>
                    <span>Spotify 連接</span>
                </div>
                <div class="status-item">
                    <span class="status-dot" id="lyrics-status"></span>
                    <span>歌詞服務</span>
                </div>
            </div>
        </div>
        -->

        <!-- 無音樂播放狀態 -->
        <div id="no-music-section" class="no-music-section" style="display: none;">
            <div class="no-music-card">
                <div class="no-music-icon">🎵</div>
                <h2>沒有正在播放的音樂</h2>
                <p>請在 Spotify 中開始播放音樂</p>
                <button id="refresh-btn" class="refresh-btn">重新檢查</button>
            </div>
        </div>
    </div>

    <!-- 字體大小選擇器 -->
    <div id="font-size-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <h3>選擇字體大小</h3>
            <div class="font-size-options">
                <button class="font-option" data-size="small">小</button>
                <button class="font-option" data-size="medium">中</button>
                <button class="font-option" data-size="large">大</button>
                <button class="font-option" data-size="extra-large">特大</button>
            </div>
            <button id="close-modal" class="close-btn">關閉</button>
        </div>
    </div>

    <!-- 播放清單模態框 -->
    <div id="playlist-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <h3>播放清單</h3>
            <div id="playlist-content" class="playlist-content">
                <div class="loading">載入中...</div>
            </div>
            <button id="close-playlist-modal" class="close-btn">關閉</button>
        </div>
    </div>

    <!-- 設備選擇模態框 -->
    <div id="devices-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <h3>選擇播放設備</h3>
            <div id="devices-content" class="devices-content">
                <div class="loading">載入中...</div>
            </div>
            <button id="close-devices-modal" class="close-btn">關閉</button>
        </div>
    </div>

    <!-- 歌詞搜尋模態框 -->
    <div id="lyrics-search-modal" class="modal" style="display: none;">
        <div class="modal-content lyrics-search-modal">
            <h3>搜尋歌詞</h3>
            <div class="search-form">
                <div class="search-input-group">
                    <input type="text" id="lyrics-search-input" placeholder="輸入歌曲名稱或歌手..." class="search-input">
                    <button id="do-search-btn" class="search-btn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
                        </svg>
                        搜尋
                    </button>
                </div>
                <div class="current-track-info" id="current-track-info" style="display: none;">
                    <span class="current-label">當前播放：</span>
                    <span id="current-track-text"></span>
                    <button id="search-current-btn" class="search-current-btn">搜尋此歌曲</button>
                </div>
            </div>
            
            <div id="search-results" class="search-results" style="display: none;">
                <h4>搜尋結果</h4>
                <div id="results-container" class="results-container">
                    <!-- 搜尋結果將在這裡顯示 -->
                </div>
            </div>
            
            <div id="search-loading" class="search-loading" style="display: none;">
                <div class="loading-spinner"></div>
                <span>搜尋中...</span>
            </div>
            
            <div class="modal-actions">
                <button id="close-lyrics-search-modal" class="close-btn">關閉</button>
            </div>
        </div>
    </div>

    <!-- 歌詞上傳模態框 -->
    <div id="lyrics-upload-modal" class="modal" style="display: none;">
        <div class="modal-content lyrics-upload-modal">
            <h3>📤 上傳歌詞</h3>
            
            <div class="upload-section">
                <div class="upload-methods">
                    <div class="upload-method">
                        <h4>📄 文件上傳</h4>
                        <input type="file" id="lyrics-file-input" accept=".lrc,.txt" />
                        <div class="file-info">
                            支持 .lrc (同步歌詞) 和 .txt (普通歌詞) 格式
                        </div>
                    </div>
                    
                    <div class="upload-method">
                        <h4>📝 文本輸入</h4>
                        <textarea id="lyrics-text-input" placeholder="請輸入歌詞內容...&#10;&#10;同步歌詞格式：&#10;[00:12.34]第一行歌詞&#10;[00:18.67]第二行歌詞&#10;&#10;或直接輸入普通歌詞文本"></textarea>
                    </div>
                </div>
                
                <div class="upload-actions">
                    <button id="apply-uploaded-lyrics" class="apply-btn">套用歌詞</button>
                    <button id="preview-uploaded-lyrics" class="preview-btn">預覽</button>
                </div>
            </div>
            
            <div id="upload-preview" class="upload-preview" style="display: none;">
                <h4>歌詞預覽</h4>
                <div id="upload-preview-content" class="preview-content"></div>
            </div>
            
            <div class="modal-actions">
                <button id="close-lyrics-upload-modal" class="close-btn">關閉</button>
            </div>
        </div>
    </div>

    <!-- 歌詞編輯模態框 -->
    <div id="lyrics-edit-modal" class="modal" style="display: none;">
        <div class="modal-content lyrics-edit-modal">
            <h3>✏️ 編輯歌詞</h3>
            
            <div class="edit-section">
                <div class="edit-toolbar">
                    <button id="edit-mode-toggle" class="mode-toggle-btn" data-mode="visual">視覺編輯</button>
                    <button id="add-timestamp-btn" class="toolbar-btn" title="添加時間戳">⏱️</button>
                    <button id="sync-with-playback-btn" class="toolbar-btn" title="與播放同步">🎵</button>
                    <button id="clear-timestamps-btn" class="toolbar-btn" title="清除所有時間戳">🗑️</button>
                </div>
                
                <div id="visual-edit-container" class="edit-container">
                    <div id="visual-lyrics-editor" class="visual-editor"></div>
                </div>
                
                <div id="text-edit-container" class="edit-container" style="display: none;">
                    <textarea id="text-lyrics-editor" class="text-editor"></textarea>
                </div>
                
                <div class="edit-actions">
                    <button id="save-edited-lyrics" class="save-btn">保存並套用</button>
                    <button id="export-edited-lyrics" class="export-btn">導出</button>
                    <button id="reset-lyrics-edit" class="reset-btn">重置</button>

                <button id="close-lyrics-edit-modal" class="close-btn">關閉</button>

    <!-- 增強功能模組 -->
    <script>
    // 增強功能模組 - 實現所有要求的改進
    (function() {
        'use strict';
        
        // 等待主腳本載入完成
        function waitForPlayer() {
            if (typeof SpotifyLyricsPlayer !== 'undefined' && window.player) {
                initEnhancedFeatures();
            } else {
                setTimeout(waitForPlayer, 100);
            }
        }
        
        function initEnhancedFeatures() {
            window.player.log('🚀 初始化增強功能模組');
            
            // 1. 增強歌詞時間調整功能 - 自動保存時間調整
            enhanceLyricsTimeAdjustment();
            
            // 2. 增強歌詞載入功能 - 自動保存歌詞和供應商
            enhanceLyricsLoading();
            
            // 3. 防止重複刷新頁面
            enhanceSessionManagement();
            
            // 4. 歌名繁體中文轉換
            enhanceTraditionalDisplay();
            
            window.player.log('✅ 增強功能模組初始化完成');
        }
        
        // 1. 增強歌詞時間調整功能
        function enhanceLyricsTimeAdjustment() {
            const originalAdjustLyricsOffset = window.player.adjustLyricsOffset;
            window.player.adjustLyricsOffset = function(offset) {
                this.lyricsTimeOffset += offset;
                this.log(`⏰ 歌詞時間調整: ${this.lyricsTimeOffset > 0 ? '+' : ''}${this.lyricsTimeOffset}ms`);
                
                // 保存歌詞時間調整到永久存儲
                if (this.currentTrack) {
                    this.saveLyricsTimeAdjustment(this.currentTrack, this.lyricsTimeOffset);
                }
                
                this.updateLyricsHighlight();
                this.showLyricsOffsetMessage(offset);
            };
            
            const originalResetLyricsOffset = window.player.resetLyricsOffset;
            window.player.resetLyricsOffset = function() {
                this.lyricsTimeOffset = 0;
                this.log('⏰ 歌詞時間偏移已重置');
                
                if (this.currentTrack) {
                    const cacheKey = this.generateTrackCacheKey(this.currentTrack);
                    this.lyricsTimeAdjustments.delete(cacheKey);
                    this.saveTimeAdjustmentsToStorage();
                }
                
                this.updateLyricsHighlight();
                this.showLyricsOffsetMessage(0, true);
            };
            
            // 添加顯示歌詞時間調整提示的方法
            window.player.showLyricsOffsetMessage = function(offset, isReset = false) {
                const message = isReset ? 
                    '⏰ 歌詞時間已重置' : 
                    `⏰ 歌詞時間${offset > 0 ? '延後' : '提前'} ${Math.abs(offset)}ms`;
                
                const messageDiv = document.createElement('div');
                messageDiv.style.cssText = `
                    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
                    background: rgba(0, 0, 0, 0.8); color: white; padding: 12px 20px;
                    border-radius: 8px; z-index: 2000; font-size: 14px; font-weight: 500;
                `;
                messageDiv.textContent = message;
                document.body.appendChild(messageDiv);
                
                setTimeout(() => {
                    if (messageDiv.parentNode) {
                        messageDiv.parentNode.removeChild(messageDiv);
                    }
                }, 1500);
            };
        }
        
        // 2. 增強歌詞載入功能
        function enhanceLyricsLoading() {
            const originalOverrideLyrics = window.player.overrideLyrics;
            if (originalOverrideLyrics) {
                window.player.overrideLyrics = function(lyrics, lyricsType, source) {
                    originalOverrideLyrics.call(this, lyrics, lyricsType, source);
                    
                    // 自動保存用戶修改的歌詞
                    if (this.currentTrack && source && source.source !== 'auto_applied') {
                        this.saveLyrics(this.currentTrack, lyrics, lyricsType, {
                            ...source,
                            appliedAt: Date.now(),
                            appliedBy: 'manual_override'
                        });
                        this.log(`💾 已自動保存修改的歌詞: ${this.currentTrack.name} - ${this.currentTrack.artist}`);
                    }
                };
            }
        }
        
        // 3. 防止重複刷新頁面
        function enhanceSessionManagement() {
            if (!window.player.hasOwnProperty('isRefreshing')) {
                window.player.isRefreshing = false;
                window.player.lastRefreshTime = 0;
            }
            
            const originalHandleAuthError = window.player.handleAuthError;
            if (originalHandleAuthError) {
                window.player.handleAuthError = async function(error, context = '') {
                    this.log(`🔑 處理認證錯誤 (增強版) (${context}): ${error.message}`);
                    
                    const now = Date.now();
                    
                    // 防止重複刷新，但不影響自動登入流程
                    if (this.isRefreshing || (now - this.lastRefreshTime < 5000)) {
                        this.log('🔄 頁面刷新操作進行中，跳過重複處理');
                        return;
                    }
                    
                    // 首先嘗試靜默恢復
                    try {
                        const silentRefreshResponse = await fetch('/api/refresh-token', {
                            method: 'POST',
                            headers: this.sessionId ? { 'X-Session-Id': this.sessionId } : {},
                            credentials: 'same-origin'
                        });
                        
                        if (silentRefreshResponse.ok) {
                            const refreshData = await silentRefreshResponse.json();
                            if (refreshData.success) {
                                this.log('✅ 靜默 token 恢復成功 (無需刷新頁面)');
                                this.consecutiveAuthErrors = 0; // 重置錯誤計數
                                setTimeout(() => this.checkCurrentTrackWithRateLimit(), 1000);
                                return;
                            }
                        }
                    } catch (e) {
                        this.log(`❌ 靜默恢復失敗: ${e.message}`);
                    }
                    
                    // 如果靜默恢復失敗，但仍保留自動登入功能，只是減少刷新頻率
                    this.log('🔄 靜默恢復失敗，嘗試智能自動登入...');
                    
                    // 確保自動登入仍然可以正常運作
                    if (this.autoLoginEnabled && (!this.lastAutoLoginAttempt || (now - this.lastAutoLoginAttempt > 15000))) {
                        this.lastAutoLoginAttempt = now;
                        this.log('🔄 觸發自動登入流程...');
                        
                        // 延遲執行自動登入，避免與其他操作衝突
                        setTimeout(() => {
                            if (this.scheduleAutoLogin) {
                                this.scheduleAutoLogin();
                            }
                        }, 2000);
                        return;
                    }
                    
                    // 最後回退到原始方法，但增加延遲避免頻繁操作
                    setTimeout(() => {
                        return originalHandleAuthError.call(this, error, context);
                    }, 3000);
                };
            }
        }
        
        // 4. 歌名繁體中文轉換
        function enhanceTraditionalDisplay() {
            const originalUpdateTrackInfo = window.player.updateTrackInfo;
            if (originalUpdateTrackInfo) {
                window.player.updateTrackInfo = function(track) {
                    // 調用原始方法
                    const result = originalUpdateTrackInfo.call(this, track);
                    
                    // 轉換繁體中文顯示
                    if (typeof convertToTraditional === 'function') {
                        if (this.trackName) {
                            this.trackName.textContent = convertToTraditional(this.trackName.textContent);
                        }
                        if (this.artistName && !this.artistName.textContent.startsWith('🎙️')) {
                            this.artistName.textContent = convertToTraditional(this.artistName.textContent);
                        }
                        if (this.albumName && !this.albumName.textContent.startsWith('Podcast:')) {
                            this.albumName.textContent = convertToTraditional(this.albumName.textContent);
                        }
                    }
                    
                    return result;
                };
            }
        }
        
        // 啟動增強功能
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', waitForPlayer);
        } else {
            waitForPlayer();
        }
    })();
    </script>
