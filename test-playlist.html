<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>播放列表測試</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #121212;
            color: white;
            padding: 20px;
        }
        .playlist-item {
            display: flex;
            align-items: center;
            padding: 12px;
            margin: 8px 0;
            background: #1e1e1e;
            border-radius: 8px;
            cursor: pointer;
        }
        .playlist-item:hover {
            background: #2a2a2a;
        }
        .playlist-item-info {
            margin-left: 12px;
        }
        .playlist-item-title {
            font-weight: 500;
            color: white;
        }
        .playlist-item-artist {
            color: #b3b3b3;
            font-size: 14px;
        }
        #testResult {
            background: #333;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
            white-space: pre-wrap;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <h1>🎵 播放列表顯示測試</h1>
    <button onclick="testPlaylistDisplay()">測試播放列表顯示</button>
    
    <div id="testResult"></div>
    <div id="playlistContainer"></div>

    <script>
        function testPlaylistDisplay() {
            // 使用您提供的真實數據
            const testTrack = {
                "id": "6Q59P3EK6dM6TUrjDsT6ug",
                "name": "每天都是生日 (feat. 頑童MJ116)",
                "artist": "187INC, 頑童Mj116",
                "image": "https://i.scdn.co/image/ab67616d0000b273e78e011c3e8eb1b6b923ae66",
                "duration": 304875
            };

            const testTracks = [testTrack, testTrack, testTrack]; // 複製3次測試

            console.log('🔥 測試數據:', testTracks);
            
            // 顯示調試信息
            document.getElementById('testResult').innerHTML = 
                `測試結果:\n` +
                `歌曲數量: ${testTracks.length}\n` +
                `第一首歌: ${testTracks[0].name}\n` +
                `歌手: ${testTracks[0].artist}\n` +
                `圖片: ${testTracks[0].image ? '✅ 有圖片' : '❌ 無圖片'}\n` +
                `圖片URL長度: ${testTracks[0].image?.length}\n`;

            // 生成HTML
            const playlistHTML = testTracks.map((track, index) => {
                return `
                <div class="playlist-item" data-track-id="${track.id}">
                    ${track.image ? 
                        `<img src="${track.image}" alt="${track.name}" 
                              style="width: 48px; height: 48px; object-fit: cover; border-radius: 4px;"
                              onerror="console.error('圖片載入失敗:', this.src); this.style.display='none';">` 
                        : 
                        `<div style="width: 48px; height: 48px; background: linear-gradient(135deg, #333, #555); 
                                   border-radius: 4px; display: flex; align-items: center; 
                                   justify-content: center; color: #999; font-size: 20px;">🎵</div>`
                    }
                    <div class="playlist-item-info">
                        <div class="playlist-item-title">${track.name || '未知歌曲'}</div>
                        <div class="playlist-item-artist">${track.artist || '未知歌手'}</div>
                    </div>
                </div>
            `;
            }).join('');

            document.getElementById('playlistContainer').innerHTML = playlistHTML;
        }
    </script>
</body>
</html>
